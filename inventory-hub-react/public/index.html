<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'hsl(43, 74%, 49%)',
            background: 'hsl(0, 0%, 100%)',
            foreground: 'hsl(240, 10%, 15%)',
            secondary: 'hsl(40, 20%, 96%)',
            muted: 'hsl(240, 5%, 45%)',
            border: 'hsl(240, 10%, 90%)'
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    .arch-image {
      border-top-left-radius: 9999px;
      border-top-right-radius: 9999px;
    }
    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
    }
    .carousel-slide { opacity: 0; pointer-events: none; }
    .carousel-slide.active { opacity: 1; pointer-events: auto; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      grid-auto-rows: 200px;
    }
    .gallery-item-1, .gallery-item-5, .gallery-item-9 { grid-row: span 1; }
    .gallery-item-2, .gallery-item-6, .gallery-item-10 { grid-row: span 2; }
    .gallery-item-3, .gallery-item-7, .gallery-item-11 { grid-row: span 2; grid-column: span 2; }
    .gallery-item-4, .gallery-item-8, .gallery-item-12 { grid-row: span 1; }
    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 150px; }
      .gallery-item-3, .gallery-item-7, .gallery-item-11 { grid-column: span 1; }
    }
  </style>
</head>
<body class="bg-background text-foreground font-sans">
  <div id="root"></div>
</body>
</html>
