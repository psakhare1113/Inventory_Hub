        labels:
          service: 'inventory-service'

  - job_name: 'products-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:9094']
        labels:
          service: 'products-service'

  - job_name: 'payment-service'
