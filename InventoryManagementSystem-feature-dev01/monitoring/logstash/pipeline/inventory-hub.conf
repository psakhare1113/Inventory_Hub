# ============================================================
# Logstash Pipeline - Inventory Hub
# Receives logs from Filebeat → Parses → Sends to Elasticsearch
# ============================================================

input {
  # Receive logs from Filebeat
  beats {
    port => 5044
  }

  # Also accept direct TCP logs (optional - for testing)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {

  # ── Parse JSON logs from Spring Boot ──────────────────────
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log_data"
    }

    # Promote important fields to top level
    mutate {
      rename => {
        "[log_data][level]"       => "log_level"
        "[log_data][service]"     => "service_name"
        "[log_data][message]"     => "log_message"
        "[log_data][timestamp]"   => "log_timestamp"
        "[log_data][thread]"      => "thread_name"
        "[log_data][logger]"      => "logger_name"
        "[log_data][traceId]"     => "trace_id"
        "[log_data][spanId]"      => "span_id"
        "[log_data][scenario]"    => "scenario"
        "[log_data][latencyMs]"   => "latency_ms"
        "[log_data][errorType]"   => "error_type"
      }
    }
  }

  # ── Tag logs by level ──────────────────────────────────────
  if [log_level] == "ERROR" {
    mutate { add_tag => ["error", "alert"] }
  } else if [log_level] == "WARN" {
    mutate { add_tag => ["warning"] }
  } else if [log_level] == "INFO" {
    mutate { add_tag => ["info"] }
  }

  # ── Tag simulated scenarios ────────────────────────────────
  if [scenario] == "HIGH_LATENCY" {
    mutate { add_tag => ["performance", "slow-response"] }
  } else if [scenario] == "DB_FAILURE" {
    mutate { add_tag => ["database", "critical"] }
  } else if [scenario] == "API_TIMEOUT" {
    mutate { add_tag => ["timeout", "critical"] }
  } else if [scenario] == "MEMORY_SPIKE" {
    mutate { add_tag => ["memory", "performance"] }
  }

  # ── Extract service name from file path if not in log ─────
  if ![service_name] and [log][file][path] {
    grok {
      match => { "[log][file][path]" => "/var/log/inventory-hub/%{DATA:service_name}/" }
    }
  }

  # ── Parse latency as number ────────────────────────────────
  if [latency_ms] {
    mutate {
      convert => { "latency_ms" => "integer" }
    }
  }

  # ── Add processing timestamp ───────────────────────────────
  mutate {
    add_field => { "processed_at" => "%{@timestamp}" }
  }

  # Remove raw message after parsing
  mutate {
    remove_field => ["log_data", "message"]
  }
}

output {
  # ── Send to Elasticsearch ──────────────────────────────────
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Dynamic index per service: inventory-hub-warehouse-service-2024.01.15
    index => "inventory-hub-%{[service_name]}-%{+YYYY.MM.dd}"
    # Fallback index if service_name is missing
    # index => "inventory-hub-unknown-%{+YYYY.MM.dd}"
  }

  # ── Debug output (comment out in production) ──────────────
  # stdout {
  #   codec => rubydebug
  # }
}
